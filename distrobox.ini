[Nvim-TS-Dev]

image=mcr.microsoft.com/devcontainers/typescript-node:latest
home="/root/distrobox/ts-dev"

environment="TZ=America/New_York LANG=en_US.UTF-8"

additional_packages="fastfetch zsh vim tmux ripgrep fd-find fzf lf zsh-syntax-highlighting zsh-autosuggestions lazygit"

init_hooks="export SHELL=/usr/bin/zsh"

init_hooks="chsh -s /usr/bin/zsh"

# Symlink fd-find to match standard naming convention
init_hooks=sudo ln -sf /usr/bin/fdfind /usr/local/bin/fd

# Install latest stable NeoVim binary directly
init_hooks=if ! command -v nvim &> /dev/null; then curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz && sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz && sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim && rm nvim-linux-x86_64.tar.gz; fi

# Install Lazygit binary directly (Pipes the GitHub API version directly into curl to avoid variable assignment errors)
# init_hooks=if ! command -v lazygit &> /dev/null; then curl -Lo /tmp/lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep -Po '"tag_name": "v\K[^"]*')_Linux_x86_64.tar.gz" && tar xf /tmp/lazygit.tar.gz -C /tmp lazygit && sudo install /tmp/lazygit /usr/local/bin && rm -rf /tmp/lazygit*; fi

# init_hooks="curl --create-dirs -L https://raw.githubusercontent.com/pinkirby/ssh-config/main/config -o \"/root/distrobox/ts-dev/.ssh/config\""

init_hooks="mkdir -p \"/root/distrobox/ts-dev/.local\""

init_hooks="mkdir -p \"/root/distrobox/ts-dev/.local/bin\""

